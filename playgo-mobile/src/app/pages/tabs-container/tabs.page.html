<ion-tabs class="scanner-hide">
  <app-tracking-quick-control
    *ngIf="showTrackingButtons$ | async"
  ></app-tracking-quick-control>
  <ion-tab-bar slot="bottom" *ngIf="showFooter$ | async">
    <ion-tab-button tab="home">
      <ion-icon name="triangle"></ion-icon>
      <ion-label>{{'homeTtle'|translate}}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="campaigns">
      <ion-icon name="ellipse"></ion-icon>
      <ion-label>{{'campaignsTitle'|translate}}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <ion-icon name="square"></ion-icon>
      <ion-label>{{'profileTitle'|translate}}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
